<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcMatch</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <!-- Game Selection Overlay -->
    <div id="game-overlay" class="overlay">
        <div class="overlay-content">
            <h1>CalcMatch</h1>
            <p>Pick a game:</p>
            <button class="level-btn game-deriva-btn" onclick="selectGame('deriva')">DerivaMatch<br><small>Derivatives: d/dx</small></button>
            <button class="level-btn game-integra-btn" onclick="selectGame('integra')">IntegraMatch<br><small>Antiderivatives: &#8747; dx</small></button>
        </div>
    </div>

    <!-- Level Selection Overlay -->
    <div id="level-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h1 id="level-game-title">DerivaMatch</h1>
            <p>Select your level:</p>
            <button class="level-btn easy-btn" onclick="selectLevel('easy')">Easy<br><small id="easy-desc">Basic Derivatives</small></button>
            <button class="level-btn normal-btn" onclick="selectLevel('normal')">Normal<br><small id="normal-desc">Product &amp; Quotient Rules</small></button>
            <button class="level-btn hard-btn" onclick="selectLevel('hard')">Hard<br><small id="hard-desc">Chain Rule</small></button>
            <button class="level-btn back-btn" onclick="backToGameSelect()">Back</button>
        </div>
    </div>

    <!-- Pass/Fail Overlay -->
    <div id="result-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h1 id="result-title"></h1>
            <p id="result-score"></p>
            <button class="level-btn" onclick="replayLevel()">Replay</button>
            <button class="level-btn" onclick="showLevelSelect()">Change Level</button>
            <button class="level-btn" onclick="showGameSelect()">Change Game</button>
        </div>
    </div>

    <div class="game-container">
        <header class="top-bar">
            <div class="timer">Time: <span id="timer">60</span>s</div>
            <div class="score">Score: <span id="score">0</span></div>
            <span class="level-label" id="level-label"></span>
            <button id="new-game" onclick="showLevelSelect()">New Game</button>
        </header>

        <div class="equation-bar">
            <h3 id="equation-title">Active Equation:</h3>
            <div id="active-equation" class="active-equation"></div>
            <button id="clear-equation" onclick="clearEquation()">Clear</button>
        </div>

        <main class="game-board">
            <div id="block-container" class="block-container"></div>
        </main>
    </div>

    <script defer src="game.js"></script>
</body>
</html>
